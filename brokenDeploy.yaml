
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  LOG_LEVEL: "DEBUG"
  PORT: "eighty" 

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  username: bXl1c2Vy  # base64(myuser)
  password: ""        # ❌ missing password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
      - name: web
        image: nginx:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT  # ❌ this will resolve to "eighty"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80  # ❌ port mismatch (container listens on 8080)
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: shared-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: shared-volume
        persistentVolumeClaim:
          claimName: nonexistent-pvc  # ❌ PVC doesn't exist

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
      - name: api
        image: busybox
        command: ["sh", "-c", "sleep 3600"]
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password  # ❌ empty
        volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: missing-configmap  # ❌ doesn't exist

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: back
  ports:
    - name: http
      port: 80
      targetPort: 8080  # ❌ backend container exposes nothing

---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-migrator
spec:
  template:
    spec:
      containers:
      - name: migrator
        image: busybox
        command: ["sh", "-c", "exit 1"]  # ❌ always fails
      restartPolicy: OnFailure
